<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('数据备份')"></head>
<body>
    <aside th:replace="layout :: sidebar"></aside>
    
    <main class="main-content">
        <header th:replace="layout :: header('数据备份')"></header>
        
        <div class="content-container">
            <!-- 统计卡片 -->
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="stat-card primary">
                        <div class="stat-icon">
                            <i class="bi bi-archive"></i>
                        </div>
                        <div class="stat-label">备份总数</div>
                        <div class="stat-value" id="backupCount">-</div>
                        <div class="stat-change">
                            <i class="bi bi-calendar-check"></i>
                            <span>保留30天内备份</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card info">
                        <div class="stat-icon">
                            <i class="bi bi-hdd"></i>
                        </div>
                        <div class="stat-label">备份总大小</div>
                        <div class="stat-value" id="totalSize">-</div>
                        <div class="stat-change">
                            <i class="bi bi-folder"></i>
                            <span>所有备份文件</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card success">
                        <div class="stat-icon">
                            <i class="bi bi-clock-history"></i>
                        </div>
                        <div class="stat-label">最新备份</div>
                        <div class="stat-value" style="font-size: 1.1rem;" id="latestBackupTime">-</div>
                        <div class="stat-change">
                            <i class="bi bi-check-circle"></i>
                            <span id="latestBackupFile">-</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card warning">
                        <div class="stat-icon">
                            <i class="bi bi-calendar-event"></i>
                        </div>
                        <div class="stat-label">下次备份</div>
                        <div class="stat-value" style="font-size: 1.1rem;">每天 02:00</div>
                        <div class="stat-change">
                            <i class="bi bi-info-circle"></i>
                            <span>自动定时执行</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 操作栏 -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1"><i class="bi bi-database me-2"></i>数据库备份管理</h6>
                            <p class="text-muted mb-0 small">系统自动每日凌晨 2 点执行备份，保留最近 30 天的备份文件</p>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-outline-primary" onclick="refreshBackupList()">
                                <i class="bi bi-arrow-clockwise"></i> 刷新列表
                            </button>
                            <button class="btn btn-outline-warning" onclick="cleanupOldBackups()">
                                <i class="bi bi-trash"></i> 清理过期
                            </button>
                            <button class="btn btn-primary" id="backupBtn" onclick="manualBackup()">
                                <i class="bi bi-cloud-arrow-up"></i> 立即备份
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 备份列表 -->
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="bi bi-list-ul me-2"></i>备份文件列表</h6>
                    <span class="badge bg-secondary" id="listBadge">0 个文件</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 80px;">序号</th>
                                    <th>文件名</th>
                                    <th style="width: 120px;">文件大小</th>
                                    <th style="width: 150px;">创建时间</th>
                                    <th style="width: 100px;">状态</th>
                                    <th style="width: 100px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="backupTableBody">
                                <tr>
                                    <td colspan="6" class="text-center py-5">
                                        <div class="spinner-border text-primary"></div>
                                        <p class="mt-2 text-muted">加载备份列表...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- 分页组件 -->
                    <div class="d-flex justify-content-between align-items-center p-3 border-top">
                        <div class="text-muted small">
                            共 <span id="totalCount">0</span> 条记录，每页 <span id="pageSize">10</span> 条
                        </div>
                        <nav aria-label="备份列表分页">
                            <ul class="pagination pagination-sm mb-0" id="pagination">
                                <!-- 分页按钮将通过JS动态生成 -->
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="layout :: scripts"></th:block>
    <script>
        setActiveNav('nav-backup');

        // 分页状态
        let currentPage = 1;
        let totalPages = 1;
        const pageSize = 10;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadBackupStats();
            loadBackupList();
            
            // 每30秒自动刷新
            setInterval(() => {
                loadBackupStats();
                loadBackupList();
            }, 30000);
        });

        // 加载备份统计
        async function loadBackupStats() {
            try {
                const response = await axios.get('/api/backup/stats');
                if (response.data.code === 200) {
                    const stats = response.data.data;
                    document.getElementById('backupCount').textContent = stats.backupCount || 0;
                    document.getElementById('totalSize').textContent = stats.formattedTotalSize || '0 B';
                    
                    if (stats.latestBackupTime) {
                        const date = new Date(stats.latestBackupTime);
                        document.getElementById('latestBackupTime').textContent = formatDateTime(date);
                        document.getElementById('latestBackupFile').textContent = stats.latestBackup || '-';
                    } else {
                        document.getElementById('latestBackupTime').textContent = '无备份';
                        document.getElementById('latestBackupFile').textContent = '-';
                    }
                }
            } catch (error) {
                console.error('加载备份统计失败:', error);
            }
        }

        // 加载备份列表
        async function loadBackupList(page = 1) {
            try {
                currentPage = page;
                const response = await axios.get(`/api/backup/list?page=${page}&size=${pageSize}`);
                if (response.data.code === 200) {
                    const result = response.data.data || {};
                    const backups = result.list || [];
                    totalPages = result.pages || 1;
                    
                    renderBackupTable(backups);
                    renderPagination(result.total || 0, result.page || 1, result.pages || 1);
                }
            } catch (error) {
                console.error('加载备份列表失败:', error);
                document.getElementById('backupTableBody').innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center py-5 text-danger">
                            <i class="bi bi-exclamation-circle fs-1"></i>
                            <p class="mt-2">加载备份列表失败</p>
                        </td>
                    </tr>
                `;
            }
        }

        // 渲染分页组件
        function renderPagination(total, page, pages) {
            document.getElementById('totalCount').textContent = total;
            document.getElementById('pageSize').textContent = pageSize;
            
            const paginationEl = document.getElementById('pagination');
            
            if (pages <= 1) {
                paginationEl.innerHTML = '';
                return;
            }
            
            let html = '';
            
            // 上一页
            html += `
                <li class="page-item ${page <= 1 ? 'disabled' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="${page > 1 ? `loadBackupList(${page - 1})` : ''}" aria-label="上一页">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
            `;
            
            // 页码
            const maxButtons = 5;
            let startPage = Math.max(1, page - Math.floor(maxButtons / 2));
            let endPage = Math.min(pages, startPage + maxButtons - 1);
            
            if (endPage - startPage < maxButtons - 1) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }
            
            // 第一页
            if (startPage > 1) {
                html += `<li class="page-item"><a class="page-link" href="javascript:void(0)" onclick="loadBackupList(1)">1</a></li>`;
                if (startPage > 2) {
                    html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                }
            }
            
            // 中间页
            for (let i = startPage; i <= endPage; i++) {
                html += `
                    <li class="page-item ${i === page ? 'active' : ''}">
                        <a class="page-link" href="javascript:void(0)" onclick="loadBackupList(${i})">${i}</a>
                    </li>
                `;
            }
            
            // 最后一页
            if (endPage < pages) {
                if (endPage < pages - 1) {
                    html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                }
                html += `<li class="page-item"><a class="page-link" href="javascript:void(0)" onclick="loadBackupList(${pages})">${pages}</a></li>`;
            }
            
            // 下一页
            html += `
                <li class="page-item ${page >= pages ? 'disabled' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="${page < pages ? `loadBackupList(${page + 1})` : ''}" aria-label="下一页">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            `;
            
            paginationEl.innerHTML = html;
        }

        // 删除备份文件
        function deleteBackup(filename) {
            confirmAction(
                `确定要删除备份文件吗？<br><br><code>${filename}</code><br><br><span class="text-danger"><i class="bi bi-exclamation-triangle"></i> 此操作不可恢复！</span>`,
                async () => {
                    try {
                        const response = await axios.post('/api/backup/delete', null, {
                            params: { filename }
                        });
                        if (response.data.code === 200) {
                            showToast('删除成功', 'success');
                            loadBackupStats();
                            loadBackupList(currentPage);
                        } else {
                            showToast('删除失败: ' + response.data.message, 'error');
                        }
                    } catch (error) {
                        showToast('删除失败: ' + (error.response?.data?.message || error.message), 'error');
                    }
                },
                '<i class="bi bi-exclamation-triangle text-danger"></i> 确认删除',
                '删除',
                'btn-danger'
            );
        }

        // 渲染备份表格
        function renderBackupTable(backups) {
            document.getElementById('listBadge').textContent = backups.length + ' 个文件';
            
            if (backups.length === 0) {
                document.getElementById('backupTableBody').innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-1"></i>
                            <p class="mt-2">暂无备份文件</p>
                        </td>
                    </tr>
                `;
                return;
            }

            document.getElementById('backupTableBody').innerHTML = backups.map((backup, index) => {
                const date = new Date(backup.createTime);
                const isLatest = index === 0 && currentPage === 1;
                const rowNum = (currentPage - 1) * pageSize + index + 1;
                return `
                    <tr>
                        <td>${rowNum}</td>
                        <td>
                            <i class="bi bi-file-earmark-binary text-primary me-2"></i>
                            ${backup.filename}
                            ${isLatest ? '<span class="badge bg-success ms-2">最新</span>' : ''}
                        </td>
                        <td>${backup.formattedSize}</td>
                        <td>${formatDateTime(date)}</td>
                        <td>
                            <span class="badge bg-success">
                                <i class="bi bi-check-circle me-1"></i>正常
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteBackup('${backup.filename}')" title="删除此备份">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 手动备份
        function manualBackup() {
            confirmAction(
                '确定要立即执行数据库备份吗？<br><br><span class="text-muted">备份过程可能需要几秒钟，请耐心等待。</span>',
                async () => {
                    const btn = document.getElementById('backupBtn');
                    const originalContent = btn.innerHTML;
                    
                    // 设置按钮为 loading 状态
                    btn.disabled = true;
                    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>备份中...';
                    
                    try {
                        const response = await axios.post('/api/backup/manual');
                        
                        if (response.data.code === 200) {
                            showToast('备份成功: ' + response.data.data, 'success');
                            loadBackupStats();
                            loadBackupList();
                        } else {
                            showToast('备份失败: ' + response.data.message, 'error');
                        }
                    } catch (error) {
                        showToast('备份失败: ' + (error.response?.data?.message || error.message), 'error');
                    } finally {
                        // 恢复按钮状态
                        btn.disabled = false;
                        btn.innerHTML = originalContent;
                    }
                },
                '<i class="bi bi-cloud-arrow-up text-primary"></i> 确认备份',
                '确认备份',
                'btn-primary'
            );
        }

        // 清理过期备份
        function cleanupOldBackups() {
            confirmAction(
                '确定要清理过期备份吗？<br><br><span class="text-warning"><i class="bi bi-exclamation-triangle"></i> 此操作将删除超过 30 天的备份文件，删除后无法恢复。</span>',
                async () => {
                    try {
                        const response = await axios.post('/api/backup/cleanup');
                        if (response.data.code === 200) {
                            const result = response.data.data;
                            showToast(`清理完成，删除 ${result.deletedCount} 个过期备份`, 'success');
                            loadBackupStats();
                            loadBackupList();
                        } else {
                            showToast('清理失败: ' + response.data.message, 'error');
                        }
                    } catch (error) {
                        showToast('清理失败: ' + (error.response?.data?.message || error.message), 'error');
                    }
                },
                '<i class="bi bi-exclamation-circle text-warning"></i> 确认清理',
                '确认清理',
                'btn-warning'
            );
        }

        // 刷新列表
        function refreshBackupList() {
            loadBackupStats();
            loadBackupList();
            showToast('列表已刷新', 'info');
        }

        // 格式化日期时间
        function formatDateTime(date) {
            if (!date || isNaN(date.getTime())) {
                return '-';
            }
            const pad = n => n.toString().padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        // Toast 提示
        function showToast(message, type = 'info') {
            const toastContainer = document.querySelector('.toast-container') || createToastContainer();
            
            const iconMap = {
                success: 'bi-check-circle-fill',
                error: 'bi-x-circle-fill',
                warning: 'bi-exclamation-triangle-fill',
                info: 'bi-info-circle-fill'
            };
            
            const bgMap = {
                success: 'bg-success',
                error: 'bg-danger',
                warning: 'bg-warning',
                info: 'bg-info'
            };
            
            const toast = document.createElement('div');
            toast.className = `toast align-items-center text-white ${bgMap[type]} border-0`;
            toast.setAttribute('role', 'alert');
            toast.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">
                        <i class="bi ${iconMap[type]} me-2"></i>${message}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            `;
            
            toastContainer.appendChild(toast);
            const bsToast = new bootstrap.Toast(toast, { delay: 3000 });
            bsToast.show();
            
            toast.addEventListener('hidden.bs.toast', () => toast.remove());
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.className = 'toast-container position-fixed top-0 end-0 p-3';
            container.style.zIndex = '9999';
            document.body.appendChild(container);
            return container;
        }
    </script>
</body>
</html>
