<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('集群监控')"></head>
<body>
    <aside th:replace="layout :: sidebar"></aside>
    
    <main class="main-content">
        <header th:replace="layout :: header('集群监控')"></header>
        
        <div class="content-container">
            <!-- 集群选择区域 -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">
                                <i class="bi bi-hdd-rack me-2"></i>选择服务器组
                            </label>
                            <select id="serverGroupSelect" class="form-select">
                                <option value="">请选择服务器组...</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">
                                <i class="bi bi-grid-3x3-gap me-2"></i>选择集群
                            </label>
                            <select id="clusterSelect" class="form-select" disabled>
                                <option value="">请先选择服务器组...</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">
                                <i class="bi bi-gear me-2"></i>操作
                            </label>
                            <div>
                                <button id="refreshBtn" class="btn btn-primary" onclick="loadMonitorData()" disabled>
                                    <i class="bi bi-arrow-clockwise"></i> 刷新数据
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 加载状态提示 -->
            <div id="loadingStatus" class="alert alert-info d-none">
                <div class="d-flex align-items-center">
                    <div class="spinner-border spinner-border-sm me-2" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <div>
                        <strong>正在加载集群监控数据...</strong>
                        <div class="small text-muted" id="loadingDetail">正在连接集群节点获取状态信息</div>
                    </div>
                </div>
            </div>

            <!-- 未选择提示 -->
            <div id="noSelectionAlert" class="alert alert-info">
                <i class="bi bi-info-circle me-2"></i>
                请先选择服务器组，然后选择要监控的集群
            </div>

            <!-- 集群监控内容 -->
            <div id="monitorContent" style="display: none;">
                <!-- 状态概览卡片 -->
                <div class="row g-4 mb-4" id="overviewCards">
                    <!-- 动态生成 -->
                </div>

                <!-- 实例监控表格 -->
                <div class="card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h6 class="mb-0">
                            <i class="bi bi-cpu me-2"></i>实例监控列表
                            <i class="bi bi-question-circle text-muted ms-1" 
                               data-bs-toggle="tooltip" 
                               title="显示集群中所有节点的实时运行指标，包括内存使用、连接数、QPS等"></i>
                        </h6>
                        <span class="badge bg-info" id="instanceCountBadge">0 个实例</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>实例地址</th>
                                        <th>角色</th>
                                        <th>
                                            状态
                                            <a href="javascript:void(0)" onclick="showMetricHelp('status')" class="text-muted ms-1">
                                                <i class="bi bi-question-circle small"></i>
                                            </a>
                                        </th>
                                        <th>
                                            内存使用
                                            <a href="javascript:void(0)" onclick="showMetricHelp('memory')" class="text-muted ms-1">
                                                <i class="bi bi-question-circle small"></i>
                                            </a>
                                        </th>
                                        <th>
                                            碎片率
                                            <a href="javascript:void(0)" onclick="showMetricHelp('frag')" class="text-muted ms-1">
                                                <i class="bi bi-question-circle small"></i>
                                            </a>
                                        </th>
                                        <th>
                                            连接数
                                            <a href="javascript:void(0)" onclick="showMetricHelp('clients')" class="text-muted ms-1">
                                                <i class="bi bi-question-circle small"></i>
                                            </a>
                                        </th>
                                        <th>
                                            QPS
                                            <a href="javascript:void(0)" onclick="showMetricHelp('qps')" class="text-muted ms-1">
                                                <i class="bi bi-question-circle small"></i>
                                            </a>
                                        </th>
                                        <th>
                                            延迟(P99)
                                            <a href="javascript:void(0)" onclick="showMetricHelp('latency')" class="text-muted ms-1">
                                                <i class="bi bi-question-circle small"></i>
                                            </a>
                                        </th>
                                        <th>
                                            复制延迟
                                            <a href="javascript:void(0)" onclick="showMetricHelp('repl')" class="text-muted ms-1">
                                                <i class="bi bi-question-circle small"></i>
                                            </a>
                                        </th>
                                        <th>
                                            慢查询
                                            <a href="javascript:void(0)" onclick="showMetricHelp('slow')" class="text-muted ms-1">
                                                <i class="bi bi-question-circle small"></i>
                                            </a>
                                        </th>
                                        <th>
                                            AOF重写
                                            <a href="javascript:void(0)" onclick="showMetricHelp('aof')" class="text-muted ms-1">
                                                <i class="bi bi-question-circle small"></i>
                                            </a>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody id="instanceTable">
                                    <!-- 动态生成 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <style>
        /* 集群选择下拉框样式 */
        #clusterDropdown {
            position: relative;
        }
        #clusterDropdown .dropdown-menu {
            width: 100%;
            margin-top: 2px;
            z-index: 9999 !important;
        }
        #clusterDropdown .dropdown-item {
            cursor: pointer;
            padding: 8px 16px;
            transition: background-color 0.2s;
        }
        #clusterDropdown .dropdown-item:hover,
        #clusterDropdown .dropdown-item.active {
            background-color: #f8f9fa;
        }
        #clusterDropdown .dropdown-item.no-match {
            color: #6c757d;
            cursor: default;
        }

    </style>

    <th:block th:replace="layout :: scripts"></th:block>
    <script>
        setActiveNav('nav-monitor-cluster');

        let currentClusterId = null;

        let currentServerGroupId = '';

        // 初始化
        async function init() {
            await loadServerGroups();
            
            // 监听集群选择变化
            document.getElementById('clusterSelect').addEventListener('change', function() {
                currentClusterId = this.value;
                if (currentClusterId) {
                    document.getElementById('refreshBtn').disabled = false;
                    document.getElementById('noSelectionAlert').style.display = 'none';
                    document.getElementById('loadingStatus').classList.remove('d-none');
                    document.getElementById('loadingDetail').textContent = '正在连接集群节点获取监控数据...';
                    loadMonitorData();
                } else {
                    document.getElementById('refreshBtn').disabled = true;
                    document.getElementById('noSelectionAlert').style.display = 'block';
                    document.getElementById('monitorContent').style.display = 'none';
                }
            });
            
            // 初始化tooltip
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl);
            });
        }

        // 加载服务器组列表
        async function loadServerGroups() {
            try {
                const response = await axios.get('/api/groups');
                if (response.data.code === 200) {
                    const groups = response.data.data || [];
                    const select = document.getElementById('serverGroupSelect');
                    select.innerHTML = '<option value="">请选择服务器组...</option>' +
                        groups.map(g => `<option value="${g.id}">${g.name} (${g.servers ? g.servers.length : 0}台)</option>`).join('');
                    
                    // 默认选中"默认服务器组"如果存在
                    const defaultGroup = groups.find(g => g.name === '默认服务器组');
                    if (defaultGroup) {
                        currentServerGroupId = defaultGroup.id.toString();
                        select.value = currentServerGroupId;
                        // 加载该组的集群
                        await loadClustersByGroup(currentServerGroupId);
                    }
                    
                    // 监听服务器组选择变化
                    select.addEventListener('change', function() {
                        currentServerGroupId = this.value;
                        currentClusterId = '';
                        
                        const clusterSelect = document.getElementById('clusterSelect');
                        clusterSelect.innerHTML = '<option value="">请选择集群...</option>';
                        clusterSelect.value = '';
                        clusterSelect.disabled = true;
                        
                        // 重置界面状态
                        document.getElementById('refreshBtn').disabled = true;
                        document.getElementById('noSelectionAlert').style.display = 'block';
                        document.getElementById('monitorContent').style.display = 'none';
                        
                        if (currentServerGroupId) {
                            loadClustersByGroup(currentServerGroupId);
                        }
                    });
                }
            } catch (error) {
                showToast('加载服务器组列表失败', 'error');
            }
        }

        // 根据服务器组加载集群列表
        async function loadClustersByGroup(groupId) {
            try {
                const response = await axios.get('/api/clusters');
                if (response.data.code === 200) {
                    allClusters = response.data.data || [];
                    // 筛选当前服务器组的集群
                    filteredClusters = allClusters.filter(c => 
                        c.serverGroupId && c.serverGroupId.toString() === groupId.toString()
                    );
                    
                    const clusterSelect = document.getElementById('clusterSelect');
                    clusterSelect.innerHTML = '<option value="">请选择集群...</option>' +
                        filteredClusters.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                    clusterSelect.disabled = false;
                    currentClusterId = '';
                }
            } catch (error) {
                showToast('加载集群列表失败', 'error');
            }
        }



        // 加载监控数据
        async function loadMonitorData() {
            if (!currentClusterId) {
                showToast('请先选择集群', 'warning');
                return;
            }

            const refreshBtn = document.getElementById('refreshBtn');
            const loadingStatus = document.getElementById('loadingStatus');
            const loadingDetail = document.getElementById('loadingDetail');
            const monitorContent = document.getElementById('monitorContent');
            
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 加载中...';
            loadingStatus.classList.remove('d-none');
            loadingDetail.textContent = '正在连接集群节点获取集群信息和实例监控数据...';

            try {
                // 同时加载集群级监控和实例监控数据
                const [clusterResponse, instanceResponse] = await Promise.all([
                    axios.get(`/api/monitor/cluster-level?clusterId=${currentClusterId}`),
                    axios.get(`/api/monitor/instances?clusterId=${currentClusterId}`)
                ]);

                if (clusterResponse.data.code === 200 && instanceResponse.data.code === 200) {
                    const clusterData = clusterResponse.data.data[0];
                    const instanceData = instanceResponse.data.data;
                    
                    loadingDetail.textContent = '数据获取成功，正在渲染监控面板...';
                    renderOverviewCards(clusterData);
                    renderInstanceTable(instanceData);
                    monitorContent.style.display = 'block';
                }
            } catch (error) {
                showToast('加载监控数据失败: ' + (error.response?.data?.message || error.message), 'error');
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> 立即刷新';
                loadingStatus.classList.add('d-none');
            }
        }

        // 渲染概览卡片
        function renderOverviewCards(data) {
            const container = document.getElementById('overviewCards');
            const healthStatus = data.healthRate > 80 ? 'success' :
                               data.healthRate > 50 ? 'warning' : 'danger';
            const replStatus = data.replicationHealth === '正常' ? 'success' :
                             data.replicationHealth === '延迟' ? 'warning' : 'danger';

            container.innerHTML = `
                <div class="col-md-6 col-xl-3">
                    <div class="card h-100" style="cursor: pointer;" onclick="showClusterMetricHelp('clusterState')">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="text-muted">集群状态</span>
                                <i class="bi bi-activity fs-4 text-${data.clusterState === 'ok' ? 'success' : 'danger'}"></i>
                            </div>
                            <h4 class="mb-0 ${data.clusterState === 'ok' ? 'text-success' : 'text-danger'}">
                                ${data.clusterState === 'ok' ? '正常' : '异常'}
                            </h4>
                            <small class="text-muted"><i class="bi bi-question-circle"></i> 点击查看说明</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-xl-3">
                    <div class="card h-100" style="cursor: pointer;" onclick="showClusterMetricHelp('health')">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="text-muted">健康度</span>
                                <i class="bi bi-heart-pulse fs-4 text-${healthStatus}"></i>
                            </div>
                            <h4 class="mb-0 text-${healthStatus}">${data.healthRate ? data.healthRate.toFixed(1) : '0.0'}%</h4>
                            <small class="text-muted">${data.runningNodes || 0}/${data.totalNodes || 0} 节点正常 <i class="bi bi-question-circle"></i></small>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-xl-3">
                    <div class="card h-100" style="cursor: pointer;" onclick="showClusterMetricHelp('replication')">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="text-muted">复制健康</span>
                                <i class="bi bi-diagram-2 fs-4 text-${replStatus}"></i>
                            </div>
                            <h4 class="mb-0 text-${replStatus}">${data.replicationHealth || '未知'}</h4>
                            <small class="text-muted">${data.masterCount || 0}主${data.slaveCount || 0}从 <i class="bi bi-question-circle"></i></small>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-xl-3">
                    <div class="card h-100" style="cursor: pointer;" onclick="showClusterMetricHelp('slots')">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="text-muted">槽位状态</span>
                                <i class="bi bi-grid-3x3 fs-4 text-info"></i>
                            </div>
                            <h4 class="mb-0">${data.slotsAssigned || 0}/16384</h4>
                            <small class="text-${data.slotsFail > 0 ? 'danger' : 'success'}">
                                ${data.slotsFail > 0 ? data.slotsFail + ' 个失效' : '所有槽位正常'} <i class="bi bi-question-circle"></i>
                            </small>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-xl-3">
                    <div class="card h-100" style="cursor: pointer;" onclick="showClusterMetricHelp('qps')">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="text-muted">总QPS</span>
                                <i class="bi bi-lightning fs-4 text-warning"></i>
                            </div>
                            <h4 class="mb-0">${data.totalQps?.toLocaleString ? data.totalQps.toLocaleString() : (data.totalQps || 0)}</h4>
                            <small class="text-muted">每秒查询数 <i class="bi bi-question-circle"></i></small>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-xl-3">
                    <div class="card h-100" style="cursor: pointer;" onclick="showClusterMetricHelp('memory')">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="text-muted">总内存</span>
                                <i class="bi bi-memory fs-4 text-primary"></i>
                            </div>
                            <h4 class="mb-0">${formatBytes((data.totalMemoryUsed || 0) * 1024 * 1024)}</h4>
                            <small class="text-muted">所有节点总和 <i class="bi bi-question-circle"></i></small>
                        </div>
                    </div>
                </div>
            `;
        }

        // 状态显示函数 - 支持多种状态格式
        function renderStatusBadge(status) {
            // 数字状态: 1=在线, 0/其他=离线
            if (status === 1 || status === '1') {
                return '<span class="badge bg-success">在线</span>';
            } else if (status === 0 || status === '0') {
                return '<span class="badge bg-danger">离线</span>';
            } else if (typeof status === 'string') {
                // 字符串状态
                const statusLower = status.toLowerCase();
                if (statusLower === 'running' || statusLower === 'online' || statusLower === 'up') {
                    return '<span class="badge bg-success">在线</span>';
                } else if (statusLower === 'stopped' || statusLower === 'offline' || statusLower === 'down' || statusLower === 'error') {
                    return '<span class="badge bg-danger">离线</span>';
                } else if (statusLower === 'unknown' || statusLower === 'unreachable') {
                    return '<span class="badge bg-secondary">未知</span>';
                }
            }
            // 默认处理
            return `<span class="badge bg-secondary">${status || '未知'}</span>`;
        }

        // 渲染实例监控表格
        function renderInstanceTable(instances) {
            const tbody = document.getElementById('instanceTable');
            document.getElementById('instanceCountBadge').textContent = `${instances?.length || 0} 个实例`;
            
            if (!instances || instances.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="11" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox display-4"></i>
                            <p class="mt-2">该集群没有实例数据</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = instances.map((inst, index) => {
                // 状态判断（使用固定阈值）
                const memoryStatus = inst.memoryUsagePercent > 95 ? 'danger' : 
                                   inst.memoryUsagePercent > 80 ? 'warning' : 'success';
                const fragStatus = inst.fragmentationRatio > 2.0 ? 'danger' : 
                                 inst.fragmentationRatio > 1.5 ? 'warning' : 'success';
                const latencyStatus = inst.latencyP99 > 10 ? 'warning' : 'success';

                return `
                    <tr class="animate-fade-in" style="animation-delay: ${index * 0.05}s;">
                        <td>
                            <code>${inst.address}</code>
                            <div class="small text-muted">${inst.physicalHost || ''}</div>
                        </td>
                        <td>
                            <span class="badge bg-${inst.role === 'master' ? 'danger' : 'info'}">
                                ${inst.role === 'master' ? '主' : '从'}
                            </span>
                        </td>
                        <td>
                            ${renderStatusBadge(inst.status)}
                        </td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="progress flex-grow-1" style="width: 60px; height: 6px;">
                                    <div class="progress-bar bg-${memoryStatus}" 
                                         style="width: ${inst.memoryUsagePercent || 0}%"></div>
                                </div>
                                <span class="small ${memoryStatus === 'danger' ? 'text-danger fw-bold' : ''}">
                                    ${inst.memoryUsagePercent?.toFixed(1) || 0}%
                                </span>
                            </div>
                            <small class="text-muted">${inst.memoryUsed || 0}/${inst.memoryMax || 0}MB</small>
                        </td>
                        <td>
                            <span class="badge bg-${fragStatus}">${inst.fragmentationRatio?.toFixed(2) || '-'}</span>
                        </td>
                        <td>${inst.connectedClients || 0}</td>
                        <td>${inst.qps || 0}</td>
                        <td>
                            <span class="${latencyStatus === 'warning' ? 'text-warning fw-bold' : ''}">
                                ${inst.latencyP99 || 0}ms
                            </span>
                        </td>
                        <td>
                            ${inst.role === 'slave' ? 
                                (inst.replicationDelay > 10 ? 
                                    `<span class="text-danger fw-bold">${inst.replicationDelay}s</span>` :
                                    `<span>${inst.replicationDelay || 0}s</span>`) :
                                '<span class="text-muted">-</span>'
                            }
                        </td>
                        <td>
                            ${inst.slowQueries > 0 ? 
                                `<span class="badge bg-warning text-dark">${inst.slowQueries}</span>` :
                                '<span class="text-muted">0</span>'
                            }
                        </td>
                        <td>
                            ${inst.aofRewriteInProgress ? 
                                '<span class="badge bg-info">进行中</span>' :
                                '<span class="text-muted">暂停</span>'
                            }
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 实例监控指标说明配置
        const metricHelpConfig = {
            status: {
                title: '实例状态',
                icon: 'bi-activity',
                color: 'info',
                content: `
                    <p><strong>统计维度：</strong>实时检测 Redis 实例的连通状态</p>
                    <p><strong>检测方式：</strong>通过 redis-cli ping 命令检测节点响应</p>
                    <ul>
                        <li><span class="badge bg-success">在线</span> - 节点响应 PONG，运行正常</li>
                        <li><span class="badge bg-danger">离线</span> - 节点无响应或连接失败</li>
                        <li><span class="badge bg-secondary">未知</span> - 状态不确定</li>
                    </ul>
                `
            },
            memory: {
                title: '内存使用',
                icon: 'bi-memory',
                color: 'primary',
                content: `
                    <p><strong>统计维度：</strong>单个实例的内存使用情况</p>
                    <p><strong>数据来源：</strong>info memory 命令</p>
                    <ul>
                        <li><strong>使用率</strong> = used_memory / maxmemory × 100%</li>
                        <li><strong>使用量</strong> = used_memory (字节)</li>
                        <li><strong>限制量</strong> = maxmemory (字节)</li>
                    </ul>
                    <p class="text-muted small">注：当未设置 maxmemory 时，使用率计算可能不准确</p>
                `
            },
            frag: {
                title: '内存碎片率',
                icon: 'bi-puzzle',
                color: 'warning',
                content: `
                    <p><strong>统计维度：</strong>内存碎片化程度</p>
                    <p><strong>数据来源：</strong>mem_fragmentation_ratio 指标</p>
                    <ul>
                        <li><strong>计算公式</strong> = used_memory_rss / used_memory</li>
                        <li><span class="badge bg-success">≤1.5</span> - 碎片率正常</li>
                        <li><span class="badge bg-warning">1.5~2.0</span> - 碎片率偏高，建议关注</li>
                        <li><span class="badge bg-danger">>2.0</span> - 碎片率过高，建议重启实例</li>
                    </ul>
                    <p class="text-muted small">注：较高的碎片率意味着操作系统分配了更多内存给Redis但未被有效利用</p>
                `
            },
            clients: {
                title: '连接数',
                icon: 'bi-people',
                color: 'info',
                content: `
                    <p><strong>统计维度：</strong>当前客户端连接数</p>
                    <p><strong>数据来源：</strong>connected_clients 指标</p>
                    <ul>
                        <li>表示当前与此实例建立连接的客户端数量</li>
                        <li>包括业务连接、监控连接、复制连接等</li>
                    </ul>
                `
            },
            qps: {
                title: 'QPS (每秒查询数)',
                icon: 'bi-lightning',
                color: 'warning',
                content: `
                    <p><strong>统计维度：</strong>实时每秒处理的命令数</p>
                    <p><strong>数据来源：</strong>instantaneous_ops_per_sec 指标</p>
                    <ul>
                        <li>反映实例当前的负载压力</li>
                        <li>包括读写命令的总和</li>
                        <li>数值会随业务高峰低谷波动</li>
                    </ul>
                `
            },
            latency: {
                title: '延迟 P99',
                icon: 'bi-clock',
                color: 'primary',
                content: `
                    <p><strong>统计维度：</strong>命令执行延迟的 99% 分位数</p>
                    <p><strong>测试方式：</strong>redis-cli --latency 采样1秒</p>
                    <ul>
                        <li><span class="badge bg-success">≤10ms</span> - 延迟正常</li>
                        <li><span class="badge bg-warning">>10ms</span> - 延迟较高，建议关注</li>
                        <li>P99 意味着 99% 的命令响应时间小于此值</li>
                    </ul>
                    <p class="text-muted small">注：延迟受网络、CPU、内存等因素影响</p>
                `
            },
            repl: {
                title: '复制延迟',
                icon: 'bi-diagram-2',
                color: 'info',
                content: `
                    <p><strong>统计维度：</strong>从节点与主节点的数据差异时间</p>
                    <p><strong>数据来源：</strong>master_last_io_seconds_ago 和 master_repl_offset</p>
                    <ul>
                        <li><strong>0s</strong> - 从节点完全跟上主节点</li>
                        <li><span class="badge bg-warning">>10s</span> - 复制延迟较高</li>
                        <li><span class="badge bg-danger">较大延迟</span> - 可能存在网络或性能问题</li>
                    </ul>
                    <p class="text-muted small">注：主节点显示 "-"，仅从节点显示实际延迟</p>
                `
            },
            slow: {
                title: '慢查询数量',
                icon: 'bi-stopwatch',
                color: 'danger',
                content: `
                    <p><strong>统计维度：</strong>慢查询日志中的记录数</p>
                    <p><strong>数据来源：</strong>SLOWLOG LEN 命令</p>
                    <ul>
                        <li>记录执行时间超过 slowlog-log-slower-than 阈值的命令</li>
                        <li>数值越高表示存在更多慢查询</li>
                        <li>建议定期清理：SLOWLOG RESET</li>
                    </ul>
                `
            },
            aof: {
                title: 'AOF 重写状态',
                icon: 'bi-arrow-repeat',
                color: 'success',
                content: `
                    <p><strong>统计维度：</strong>AOF 文件重写进程状态</p>
                    <p><strong>数据来源：</strong>aof_rewrite_in_progress 指标</p>
                    <ul>
                        <li><span class="badge bg-info">进行中</span> - 正在执行 AOF 重写</li>
                        <li><span class="text-muted">暂停</span> - 未在进行 AOF 重写</li>
                    </ul>
                    <p class="text-muted small">AOF 重写会压缩 AOF 文件大小，过程中可能影响性能</p>
                `
            }
        };

        // 显示指标说明弹框
        function showMetricHelp(metricKey) {
            const config = metricHelpConfig[metricKey];
            if (!config) return;
            
            const modalHtml = `
                <div class="modal fade" id="metricHelpModal" tabindex="-1">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header bg-${config.color} text-white">
                                <h5 class="modal-title">
                                    <i class="bi ${config.icon} me-2"></i>${config.title}
                                </h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                ${config.content}
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-light" data-bs-dismiss="modal">知道了</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // 移除已存在的弹框
            const existingModal = document.getElementById('metricHelpModal');
            if (existingModal) {
                existingModal.remove();
            }
            
            // 添加新弹框并显示
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            new bootstrap.Modal(document.getElementById('metricHelpModal')).show();
        }

        // 集群监控指标说明配置
        const clusterMetricHelpConfig = {
            clusterState: {
                title: '集群状态',
                icon: 'bi-activity',
                color: 'success',
                content: `
                    <p><strong>统计维度：</strong>Redis 集群整体运行状态</p>
                    <p><strong>数据来源：</strong>CLUSTER INFO 命令返回的 cluster_state</p>
                    <ul>
                        <li><span class="badge bg-success">正常</span> - 集群状态为 ok，所有槽位正常分配</li>
                        <li><span class="badge bg-danger">异常</span> - 集群状态为 fail，存在故障或槽位分配异常</li>
                    </ul>
                    <p class="text-muted small">注：集群状态反映了整体健康情况，异常时需要立即排查</p>
                `
            },
            health: {
                title: '集群健康度',
                icon: 'bi-heart-pulse',
                color: 'danger',
                content: `
                    <p><strong>统计维度：</strong>节点健康状况百分比</p>
                    <p><strong>计算公式：</strong>健康度 = (正常节点数 / 总节点数) × 100%</p>
                    <ul>
                        <li><span class="badge bg-success">≥80%</span> - 集群健康状况良好</li>
                        <li><span class="badge bg-warning">50%~80%</span> - 部分节点异常，建议关注</li>
                        <li><span class="badge bg-danger"><50%</span> - 大量节点异常，需立即处理</li>
                    </ul>
                    <p class="text-muted small">注：节点状态通过 redis-cli ping 检测，返回 PONG 为正常</p>
                `
            },
            replication: {
                title: '复制健康',
                icon: 'bi-diagram-2',
                color: 'info',
                content: `
                    <p><strong>统计维度：</strong>主从复制健康状况</p>
                    <p><strong>判断逻辑：</strong></p>
                    <ul>
                        <li><span class="badge bg-success">正常</span> - 所有从节点复制延迟 < 10秒</li>
                        <li><span class="badge bg-warning">延迟</span> - 存在从节点复制延迟 ≥ 10秒</li>
                        <li><span class="badge bg-danger">异常</span> - 存在主从无法连接或复制中断</li>
                    </ul>
                    <p class="text-muted small">注：复制延迟过高可能导致主从数据不一致</p>
                `
            },
            slots: {
                title: '槽位状态',
                icon: 'bi-grid-3x3',
                color: 'info',
                content: `
                    <p><strong>统计维度：</strong>Redis Cluster 槽位分配状态</p>
                    <p><strong>数据来源：</strong>CLUSTER INFO 命令</p>
                    <ul>
                        <li><strong>已分配槽位</strong> - 已经分配给节点的槽位数量（总共16384个）</li>
                        <li><strong>正常槽位</strong> - 状态正常的槽位</li>
                        <li><strong>故障槽位</strong> - 状态异常的槽位（slots_fail）</li>
                    </ul>
                    <p class="text-muted small">注：槽位分配异常会导致数据无法访问或路由错误</p>
                `
            },
            qps: {
                title: '集群总QPS',
                icon: 'bi-lightning',
                color: 'warning',
                content: `
                    <p><strong>统计维度：</strong>集群所有节点的 QPS 总和</p>
                    <p><strong>计算方式：</strong></p>
                    <ul>
                        <li>对集群中每个节点执行 info stats</li>
                        <li>获取 instantaneous_ops_per_sec 指标</li>
                        <li>将所有节点的 QPS 求和</li>
                    </ul>
                    <p class="text-muted small">注：QPS 反映集群整体负载压力，与节点数量相关</p>
                `
            },
            memory: {
                title: '集群总内存',
                icon: 'bi-memory',
                color: 'primary',
                content: `
                    <p><strong>统计维度：</strong>集群所有节点的内存使用总量</p>
                    <p><strong>计算方式：</strong></p>
                    <ul>
                        <li>对集群中每个节点执行 info memory</li>
                        <li>获取 used_memory 指标（字节）</li>
                        <li>将所有节点的内存使用量求和</li>
                        <li>转换为 MB/GB 显示</li>
                    </ul>
                    <p class="text-muted small">注：总内存不包含内存碎片带来的额外开销</p>
                `
            }
        };

        // 显示集群监控指标说明弹框
        function showClusterMetricHelp(metricKey) {
            const config = clusterMetricHelpConfig[metricKey];
            if (!config) return;
            
            const modalHtml = `
                <div class="modal fade" id="clusterMetricHelpModal" tabindex="-1">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header bg-${config.color} text-white">
                                <h5 class="modal-title">
                                    <i class="bi ${config.icon} me-2"></i>${config.title}
                                </h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                ${config.content}
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-light" data-bs-dismiss="modal">知道了</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // 移除已存在的弹框
            const existingModal = document.getElementById('clusterMetricHelpModal');
            if (existingModal) {
                existingModal.remove();
            }
            
            // 添加新弹框并显示
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            new bootstrap.Modal(document.getElementById('clusterMetricHelpModal')).show();
        }

        // 初始化
        init();
    </script>
</body>
</html>
